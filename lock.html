<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0e0e0e">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon.png">
    <title>SecureSheet | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0e0e0e; }
        ::-webkit-scrollbar-thumb { background: #424754; }
        
        /* Glitch effect base */
        .glitch-text { position: relative; }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
    </style>
    <script type="module" src="/src/main.js"></script>
</head>
<body class="bg-[#0e0e0e] text-[#e5e2e1] font-['Space_Grotesk'] h-screen w-screen flex flex-col items-center justify-center p-4 selection:bg-[#adc6ff]/30">

    <div class="w-full max-w-sm flex flex-col items-center gap-6">
        
        <!-- Header / Logo -->
        <div class="flex flex-col items-center gap-2">
            <div class="w-16 h-16 bg-[#131313] rounded-full border border-[#424754]/30 flex items-center justify-center shadow-[0_0_30px_rgba(173,198,255,0.05)]">
                <span class="material-symbols-outlined text-4xl text-[#adc6ff]" data-icon="lock">lock</span>
            </div>
            <h1 class="font-['Manrope'] font-black text-2xl tracking-tighter uppercase mt-4">SecureSheet</h1>
            <p id="lock-subtitle" class="text-xs font-['JetBrains_Mono'] text-[#c2c6d6] uppercase tracking-[0.2em] text-center">Identifying Device...</p>
        </div>

        <!-- Auth Form -->
        <div class="w-full bg-[#131313] border border-[#424754]/20 p-6 flex flex-col gap-4">
            <div class="flex justify-between items-center border-b border-[#424754]/20 pb-2">
                <span class="text-[10px] font-bold font-['JetBrains_Mono'] uppercase tracking-widest text-[#c2c6d6]">Authorization</span>
                <span id="lock-status" class="w-2 h-2 rounded-full bg-error animate-pulse"></span>
            </div>

            <div class="flex flex-col gap-1 mt-2">
                <label id="lock-input-label" class="text-[9px] uppercase tracking-widest text-primary font-bold">Enter Master Password</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-[16px] text-[#424754]">key</span>
                    <input id="lock-pwd" type="password" class="w-full bg-[#0e0e0e] border border-[#424754]/30 focus:border-[#adc6ff] focus:ring-1 focus:ring-[#adc6ff] text-sm py-3 pl-10 pr-4 outline-none font-['JetBrains_Mono'] tracking-widest transition-colors" placeholder="••••••••" autofocus>
                </div>
            </div>

            <!-- Confirm Input (Hidden by default, used only for Registration) -->
            <div id="lock-confirm-group" class="hidden flex-col gap-1 mt-2">
                <label class="text-[9px] uppercase tracking-widest text-tertiary font-bold">Confirm Database Password</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-[16px] text-[#424754]">password</span>
                    <input id="lock-pwd-confirm" type="password" class="w-full bg-[#0e0e0e] border border-[#424754]/30 focus:border-tertiary focus:ring-1 focus:ring-tertiary text-sm py-3 pl-10 pr-4 outline-none font-['JetBrains_Mono'] tracking-widest transition-colors" placeholder="••••••••">
                </div>
                <p class="text-[9px] text-[#c2c6d6]/60 leading-tight mt-1">WARNING: Setting this password encrypts your session gateway. It cannot be recovered if lost.</p>
            </div>

            <p id="lock-error" class="hidden text-error text-[10px] font-['JetBrains_Mono'] uppercase tracking-wide mt-2">Access Denied. Invalid Hash.</p>

            <button id="lock-btn" class="mt-4 w-full bg-[#adc6ff] hover:bg-white text-[#0e0e0e] font-['Manrope'] font-extrabold uppercase text-xs tracking-widest py-3 flex items-center justify-center gap-2 transition-colors">
                <span class="material-symbols-outlined text-[16px]">vpn_key</span>
                <span>Decrypt Vault</span>
            </button>

            <button id="lock-reset" class="hidden mt-3 w-full text-[#c2c6d6]/50 hover:text-error text-[9px] font-['JetBrains_Mono'] uppercase tracking-widest py-2 transition-colors text-center">
                Forgot Password? Reset Vault Lock
            </button>
        </div>

        <div class="font-['JetBrains_Mono'] text-[9px] text-[#424754] uppercase tracking-widest text-center mt-8">
            <p>SHA-256 SESSION GATEWAY</p>
            <p class="mt-1">SecureSheet v1.0.0</p>
        </div>

    </div>

</body>
</html>
